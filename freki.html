<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>FrekiSzámoló</title>
</head>
<body>
    <a href="index.html">Home</a>
    <br>


    <h1>FrekiSzámoló</h1>

    <img src="img/Rezonancia+frekvencia.jpg" alt="rezofreki képlet" width="300px">

    <form action="">
        <label for="induk">Add meg az induktivitás értékét(L): </label>
        <input type="number" name="induk" id="induk"> uH <br><br
        <label for="capac">Add meg a kapacitás értékét (C): </label>
        <input type="number" name="capac" id="capac"> uF <br><br>
        <input type="button" onclick="szamold()" value="ENTER">
        <br>
    </form>

    <p id="fo">Az eredmény itt fog megjelenni, ha meg nyomod az ENTER gombot!: </p>

    <script>
        function szamold(){
            let L = parseInt(induk.value) / 1000000;
            let C = parseInt(capac.value) / 1000000;
            let freki = L* C ;
            freki = Math.sqrt(freki);
            freki = 2 * freki;
            freki = Math.PI * freki;
            freki = 1 / freki;
            document.getElementById('fo').innerHTML = freki;
        }
    </script>
    

</body>
</html>
